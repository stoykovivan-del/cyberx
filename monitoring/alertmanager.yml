global:
  resolve_timeout: 5m
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'cyberx-on-call'
  routes:
    - match:
        severity: critical
      receiver: 'cyberx-critical'
      continue: true
    
    - match:
        severity: warning
      receiver: 'cyberx-warning'

receivers:
  - name: 'cyberx-on-call'
    pagerduty_configs:
      - service_key: ${PAGERDUTY_SERVICE_KEY}
        client: 'CyberX Alertmanager'
        client_url: 'https://monitoring.cyberx.io'
        description: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        details:
          - key: 'environment'
            value: 'production'
          - key: 'cluster'
            value: 'cyberx-prod'
          - key: 'region'
            value: '${AWS_REGION}'

  - name: 'cyberx-critical'
    pagerduty_configs:
      - service_key: ${PAGERDUTY_CRITICAL_SERVICE_KEY}
        client: 'CyberX Critical Alerts'
        client_url: 'https://monitoring.cyberx.io'
        description: 'CRITICAL: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        severity: critical
        details:
          - key: 'environment'
            value: 'production'
          - key: 'cluster'
            value: 'cyberx-prod'
          - key: 'severity'
            value: 'critical'

  - name: 'cyberx-warning'
    pagerduty_configs:
      - service_key: ${PAGERDUTY_WARNING_SERVICE_KEY}
        client: 'CyberX Warning Alerts'
        client_url: 'https://monitoring.cyberx.io'
        description: 'WARNING: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        severity: warning
        details:
          - key: 'environment'
            value: 'production'
          - key: 'cluster'
            value: 'cyberx-prod'
          - key: 'severity'
            value: 'warning'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['instance']