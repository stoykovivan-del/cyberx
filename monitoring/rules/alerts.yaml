groups:
  - name: cyberx_critical_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}"
          runbook_url: "https://runbooks.cyberx.io/high-error-rate"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Service has been down for more than 1 minute"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 3m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "99th percentile latency is {{ $value }}s"

      - alert: MemoryExhaustion
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Memory running low on {{ $labels.instance }}"
          description: "Available memory is {{ $value | humanizePercentage }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Available disk space is {{ $value | humanizePercentage }}"

      - alert: CPUThrottling
        expr: rate(container_cpu_cfs_throttled_periods_total[5m]) > 0.25
        for: 3m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "CPU throttling on {{ $labels.container }}"
          description: "Container is being throttled {{ $value | humanizePercentage }} of the time"

  - name: cyberx_warning_alerts
    interval: 60s
    rules:
      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 1000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High request rate on {{ $labels.service }}"
          description: "Request rate is {{ $value }} per second"

      - alert: ElevatedErrorRate
        expr: rate(http_requests_total{status=~"4.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Elevated 4xx error rate on {{ $labels.service }}"
          description: "4xx error rate is {{ $value | humanizePercentage }}"